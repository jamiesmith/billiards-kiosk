---
layout: none
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark light">
  <title>Billiards Scorekeeper</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
  <style>
    :root {
      --bg:       #141420;
      --surface:  #1e1e30;
      --surface2: #272740;
      --border:   #3a3a5c;
      --accent:   #2e8a57;
      --accent-h: #3aad6e;
      --text:     #ddddf0;
      --muted:    #8888aa;
      --a:        #5a8fd4;
      --a-dark:   #2d5a8e;
      --b:        #d4935a;
      --b-dark:   #8e5a2d;
      --danger:   #c04f4f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 17px;
      min-height: 100vh;
    }

    #app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 1rem 3rem;
    }

    h1 { font-size: 1.9rem; text-align: center; margin-bottom: 1rem; }
    h2 { font-size: 1.2rem; margin-bottom: 0.75rem; }
    h3 { font-size: 1rem; color: var(--muted); margin-bottom: 0.6rem; font-weight: 600; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      margin-bottom: 1rem;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 9px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      padding: 0.55rem 1rem;
      min-height: 48px;
      transition: filter 0.12s, transform 0.08s;
    }
    button:active  { transform: scale(0.96); }
    button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    button:not(:disabled):hover { filter: brightness(1.15); }

    .btn-primary  { background: var(--accent); }
    .btn-ghost    { background: var(--surface2); border: 1px solid var(--border); }
    .btn-danger   { background: var(--danger); }
    .btn-a        { background: var(--a-dark); }
    .btn-b        { background: var(--b-dark); }
    .btn-sm       { font-size: 0.85rem; min-height: 36px; padding: 0.3rem 0.7rem; }
    .btn-lg       { font-size: 1.25rem; min-height: 64px; padding: 1rem 1.2rem; width: 100%; }
    .btn-round    { border-radius: 50%; width: 48px; min-height: 48px; padding: 0; font-size: 1.4rem; display:inline-flex; align-items:center; justify-content:center; }

    .btn-game {
      background: var(--surface2);
      border: 2px solid var(--border);
      font-size: 1.1rem;
      font-weight: 700;
      min-height: 100px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-game.active {
      border-color: var(--accent);
      background: rgba(46,138,87,0.18);
      color: var(--accent-h);
    }

    /* ── Inputs ──────────────────────────────────────────────────────────── */
    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 0.55rem 0.8rem;
      min-height: 46px;
      margin-bottom: 0.75rem;
    }
    input[type="text"]:focus { outline: none; border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
    .grid2-flat { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; }

    /* ── Player slots ────────────────────────────────────────────────────── */
    .player-slot {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface2);
      border-radius: 9px;
      padding: 0.55rem 0.75rem;
      min-height: 48px;
      margin-bottom: 0.5rem;
    }
    .player-slot .name { flex: 1; font-weight: 600; }
    .player-slot.empty { color: var(--muted); font-style: italic; background: transparent; border: 1px dashed var(--border); }
    .badge {
      font-size: 0.7rem;
      background: var(--accent);
      border-radius: 5px;
      padding: 0.15rem 0.45rem;
      color: #fff;
      white-space: nowrap;
    }

    /* ── Player pills ────────────────────────────────────────────────────── */
    .pills { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-top: 0.4rem; }
    .pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.35rem 0.85rem;
      font-size: 0.9rem;
      min-height: 40px;
      cursor: pointer;
    }
    .pill:hover { border-color: var(--accent); }

    /* ── Score cards ─────────────────────────────────────────────────────── */
    .score-card {
      border-radius: 14px;
      padding: 1.25rem 1rem;
      text-align: center;
      border: 2px solid;
    }
    .score-card .sc-name  { font-size: 1.7rem; font-weight: 700; margin-bottom: 0.25rem; }
    .score-card .sc-wins  { font-size: 6rem; font-weight: 800; line-height: 1; margin-bottom: 0.4rem; }
    .sc-wins-row { display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .sc-players { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .player-box {
      flex: 1;
      border-radius: 10px;
      padding: 0.6rem 0.5rem;
      text-align: center;
    }
    .player-box.shooting {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.4);
    }
    .player-box.bench {
      background: transparent;
      border: 2px dashed rgba(255,255,255,0.15);
      opacity: 0.6;
    }
    .player-box .pb-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.2rem; }
    .player-box .pb-name  { font-size: 1.6rem; font-weight: 800; line-height: 1.1; }
    .sc-swap {
      width: 100%; margin-top: 0.4rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 0.9rem; min-height: 40px;
    }

    /* ── 8-ball extras ───────────────────────────────────────────────────── */
    .ss-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .ss-team { display: flex; flex-direction: column; gap: 0.4rem; }
    .ss-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      font-size: 0.95rem;
      font-weight: 600;
      min-height: 52px;
      border-radius: 9px;
    }
    .ss-btn.active { border-color: var(--accent); background: rgba(46,138,87,0.2); }

    /* ── Straight pool extras ────────────────────────────────────────────── */
    .sp-grid     { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .sp-controls { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-top: 0.4rem; }
    .sp-score    { font-size: 2.2rem; font-weight: 800; min-width: 2.5ch; text-align: center; }

    /* ── Bottom action row ───────────────────────────────────────────────── */
    .bottom-row { display: flex; flex-wrap: wrap; gap: 0.7rem; }
    .bottom-row button { flex: 1; min-width: 120px; }

    /* ── Play mode ───────────────────────────────────────────────────────── */
    .play-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; flex-direction: column;
      padding: 1.5vh 1.5vw 1vh;
    }
    .play-next-chip {
      text-align: center; font-size: clamp(0.8rem, 1.8vw, 1.4rem);
      font-weight: 600; opacity: 0.6; padding: 0.3vh 0; letter-spacing: 0.03em;
    }
    .play-close {
      position: absolute; top: 1vh; left: 1vw; z-index: 1000;
      background: rgba(128,128,128,0.25); border: none; border-radius: 50%;
      width: clamp(2.5rem, 5vw, 4rem); height: clamp(2.5rem, 5vw, 4rem);
      font-size: clamp(1.2rem, 2.5vw, 2rem); line-height: 1; cursor: pointer;
      color: var(--text); display: flex; align-items: center; justify-content: center;
    }
    .play-overlay .play-cards {
      flex: 1; display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      gap: 1.5vw; min-height: 0;
    }
    .play-overlay .score-card {
      border-radius: 2vw;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 2vh 2vw;
      border-width: 3px;
      height: 100%; box-sizing: border-box; overflow: hidden;
    }
    .play-overlay .score-card .sc-name  { font-size: clamp(1.8rem, 5.5vw, 6rem); margin-bottom: 1vh; flex-shrink: 0; line-height: 1.15; }
    .play-overlay .play-ball            { flex-shrink: 0; margin-bottom: 1vh; }
    .play-overlay .play-ball img        { width: min(16vw, 22vh); height: min(16vw, 22vh); display: block; }
    img[src*="billiard-ball"] { filter: none !important; }
    .play-win-btn { display: none; }
    .play-overlay .play-win-btn {
      display: block; width: 80%; margin-top: auto; margin-bottom: 1vh; flex-shrink: 0;
      background: var(--accent); color: #fff;
      font-size: clamp(1.2rem, 3.5vw, 3rem); font-weight: 900;
      letter-spacing: 0.04em;
      min-height: unset; padding: 1.2vh 2vw;
      border-radius: 999px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    .play-toolbar {
      display: flex; justify-content: center; align-items: center;
      gap: 1.5vw; padding-top: 0.8vh; flex-shrink: 0;
    }
    .play-toolbar button {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: clamp(1.3rem, 3vw, 2.2rem);
      min-height: clamp(3.5rem, 9vh, 6.5rem);
      padding: 0.5vh 3vw; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      opacity: 0.7;
    }
    .play-toolbar button:hover { opacity: 1; }
    .break-badge {
      font-size: clamp(1.1rem, 2.6vw, 2rem);
      font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px; padding: 0.25em 0.9em; margin-bottom: 0.5vh;
      display: inline-block;
    }


    /* ── Custom confirm dialog ───────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem 1.75rem 1.5rem;
      max-width: 340px; width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .modal p { font-size: 1.15rem; font-weight: 600; margin-bottom: 1.25rem; line-height: 1.4; }
    .modal .modal-btns { display: flex; gap: 0.75rem; }
    .modal .modal-btns button { flex: 1; }

    /* ── Game header ─────────────────────────────────────────────────────── */
    .game-header { text-align: center; margin-bottom: 1rem; }
    .game-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.25rem 0.75rem 0.25rem 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    /* ── Summary ─────────────────────────────────────────────────────────── */
    .summary-card { border-radius: 14px; padding: 1.5rem; text-align: center; border: 2px solid; }
    .big-score    { font-size: 3.5rem; font-weight: 800; line-height: 1; margin: 0.4rem 0; }
    .big-msg      { font-size: 1.4rem; text-align: center; margin: 0.75rem 0; }
    .action-stack { display: flex; flex-direction: column; gap: 0.7rem; }

    /* ── Utilities ───────────────────────────────────────────────────────── */
    .label   { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.25rem; }
    .muted   { color: var(--muted); }
    .center  { text-align: center; }
    .mt-sm   { margin-top: 0.6rem; }
    .mt-1    { margin-top: 1rem; }
    .mb-sm   { margin-bottom: 0.6rem; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 0.85rem 0; }
    .row     { display: flex; gap: 0.5rem; align-items: center; }
    .flex1   { flex: 1; }

    @media (max-width: 520px) {
      .grid2     { grid-template-columns: 1fr; }
      .grid2-flat { grid-template-columns: 1fr 1fr; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// Player roster comes from _data/billiards.yml, unless overridden per-load
// with ?players=Alice,Bob,Chris (comma-separated names, no YAML edit needed).
const DEFAULT_PLAYERS = {{ site.data.billiards.players | jsonify }};
const BASE_PLAYERS = (() => {
  const raw = new URLSearchParams(location.search).get('players');
  if (!raw) return DEFAULT_PLAYERS;
  const names = raw.split(',').map(n => n.trim()).filter(Boolean);
  return names.length ? names : DEFAULT_PLAYERS;
})();

// ── GAME TYPE REGISTRY ──────────────────────────────────────────────────────
// To add a new game, add an entry here with id, name, initExtras, renderExtras.
// ── BALL RENDERERS ──────────────────────────────────────────────────────────
const BALL_PX = { lg: 72, sel: 110, score: 90, badge: 56, md: 36, sm: 26 };

function ballImg(file, size) {
  const px = BALL_PX[size] || 36;
  return `<img src="./assets/images/billiards/${file}" width="${px}" height="${px}"
               style="display:inline-block;flex-shrink:0;vertical-align:middle">`;
}

const GAME_TYPES = {
  'eight-ball': {
    id: 'eight-ball',
    name: '8-Ball',
    ballHtml: (size='lg') => ballImg('billiard-ball-8.png', size),
    initExtras: () => ({ solidsTeam: null }),
    teamBadge(teamIdx, ex) {
      if (ex.solidsTeam === null) return '';
      const file = ex.solidsTeam === teamIdx ? 'billiard-ball-5.png' : 'billiard-ball-12.png';
      return ballImg(file, 'score');
    },
    playBallPicker(teamIdx, ex, color) {
      const { solidsTeam } = ex;
      const assigned = solidsTeam !== null;
      const isSolids = solidsTeam === teamIdx;
      const sz = 'min(44vw, 58vh)';
      if (assigned) {
        const file = isSolids ? 'billiard-ball-5.png' : 'billiard-ball-12.png';
        return `<div class="play-ball" style="margin-bottom:3vh">
          <img src="./assets/images/billiards/${file}" style="width:${sz};height:${sz};display:block">
        </div>`;
      }
      const pickSz = 'clamp(3.5rem,18vw,18rem)';
      return `<div class="play-ball" style="display:flex;gap:3vw;align-items:center;justify-content:center;margin-bottom:3vh">
        <button onclick="D('setSolids',${teamIdx})" style="background:none;border:none;padding:0;min-height:0;cursor:pointer">
          <img src="./assets/images/billiards/billiard-ball-5.png" style="width:${pickSz};height:${pickSz};display:block">
        </button>
        <button onclick="D('setStripes',${teamIdx})" style="background:none;border:none;padding:0;min-height:0;cursor:pointer">
          <img src="./assets/images/billiards/billiard-ball-12.png" style="width:${pickSz};height:${pickSz};display:block">
        </button>
      </div>`;
    },
    renderExtras(ex, teams) {
      const { solidsTeam } = ex;
      const cls = (teamIdx, type) =>
        solidsTeam !== null && (type === 'solids' ? solidsTeam === teamIdx : solidsTeam !== teamIdx) ? 'active' : '';
      return `<div class="card">
        <h3>Solids &amp; Stripes</h3>
        <div class="ss-grid">
          ${[0,1].map(i => `
            <div class="ss-team">
              <div class="label">${x(teamLabel(i))}</div>
              <button class="ss-btn ${cls(i,'solids')}" onclick="D('setSolids',${i})">
                ${ballImg('billiard-ball-5.png','sm')} Solids
              </button>
              <button class="ss-btn ${cls(i,'stripes')}" onclick="D('setStripes',${i})">
                ${ballImg('billiard-ball-12.png','sm')} Stripes
              </button>
            </div>`).join('')}
        </div>
      </div>`;
    },
  },

  'nine-ball': {
    id: 'nine-ball', name: '9-Ball',
    ballHtml: (size='lg') => ballImg('billiard-ball-9.png', size),
    initExtras: () => ({}),
    renderExtras: () => '',
  },

  'ten-ball': {
    id: 'ten-ball', name: '10-Ball',
    ballHtml: (size='lg') => ballImg('billiard-ball-10.png', size),
    initExtras: () => ({}),
    renderExtras: () => '',
  },

  'straight-pool': {
    id: 'straight-pool', name: 'Straight Pool',
    ballHtml: (size='lg') => ballImg('billiard-straight-pool.png', size),
    initExtras: () => ({ scores: [0, 0], target: 100 }),
    playExtras(teamIdx, ex, color) {
      const score = ex.scores[teamIdx];
      const target = ex.target || 0;
      const pct = target ? Math.min(100, Math.round(score / target * 100)) : 0;
      return `
        <div style="text-align:center;width:100%;margin-bottom:0.5vh">
          <div style="font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;opacity:0.55;margin-bottom:0.3vh">Score${target ? ' / '+target : ''}</div>
          <div style="display:grid;grid-template-columns:clamp(3rem,8vw,7rem) 1fr clamp(3rem,8vw,7rem);align-items:center;width:90%;margin:0 auto">
            <button class="btn-ghost btn-round" style="font-size:clamp(1.5rem,4vw,3.5rem);width:clamp(4rem,9vw,8rem);min-height:clamp(4rem,9vw,8rem);justify-self:center"
              onclick="D('adjScore',${teamIdx},-1)">−</button>
            <span style="font-size:clamp(4rem,20vw,22rem);font-weight:900;line-height:1;color:${color};text-align:center">${score}</span>
            <button class="btn-ghost btn-round" style="font-size:clamp(1.5rem,4vw,3.5rem);width:clamp(4rem,9vw,8rem);min-height:clamp(4rem,9vw,8rem);justify-self:center"
              onclick="D('adjScore',${teamIdx},1)" ${target && score >= target ? 'disabled' : ''}>+</button>
          </div>
          ${target ? `<div style="margin-top:0.5vh;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;width:80%;margin-left:auto;margin-right:auto">
            <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width 0.2s"></div>
          </div>
          <button onclick="showTargetPicker()" style="background:none;border:none;padding:0;min-height:0;cursor:pointer;font-size:clamp(0.9rem,2vw,1.6rem);opacity:0.6;margin-top:0.5vh;letter-spacing:0.04em;color:var(--text);text-decoration:underline dotted">Playing to ${target}</button>` : ''}
        </div>`;
    },
    renderExtras(ex, teams) {
      const target = ex.target || 0;
      return `<div class="card">
        <h3>Running Score</h3>
        <div class="sp-grid">
          ${[0,1].map(i => {
            const pct = target ? Math.min(100, Math.round(ex.scores[i] / target * 100)) : 0;
            return `
            <div>
              <div class="label">${x(teamLabel(i))}</div>
              <div class="sp-controls">
                <button class="btn-ghost btn-round" onclick="D('adjScore',${i},-1)">−</button>
                <span class="sp-score">${ex.scores[i]}</span>
                <button class="btn-ghost btn-round" onclick="D('adjScore',${i},1)">+</button>
              </div>
              ${target ? `<div style="margin-top:0.4rem;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${i===0?'var(--a)':'var(--b)'};border-radius:3px;transition:width 0.2s"></div>
              </div>
              <div class="label" style="text-align:center;margin-top:0.2rem">${ex.scores[i]} / ${target}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
        <hr class="divider">
        <div class="label" style="text-align:center;margin-bottom:0.4rem">Race to</div>
        <div style="display:flex;gap:0.4rem;justify-content:center">
          ${[50,75,100,125,150].map(n => `
            <button class="btn-ghost btn-sm ${target===n?'ss-btn active':''}"
              style="flex:1" onclick="D('setTarget',${n})">${n}</button>
          `).join('')}
        </div>
      </div>`;
    },
  },
};

// ── STATE ───────────────────────────────────────────────────────────────────
let S = freshState();
let playMode = false;
let queuePending = [];

// ── DEBUG MODE ───────────────────────────────────────────────────────────────
(function applyDebug() {
  const p = new URLSearchParams(location.search);
  if (!p.has('debug')) return;
  const all = BASE_PLAYERS.slice();
  // Pre-fill two players per team from the roster
  S.teams[0].players = all.slice(0, 2);
  S.teams[1].players = all.slice(2, 4);
  // Optional overrides: ?game=nine-ball  ?target=50  ?go=1 (auto-start)
  if (p.get('game') && GAME_TYPES[p.get('game')]) S.gameType = p.get('game');
  if (p.get('go') === '1') {
    S.extras = GAME_TYPES[S.gameType].initExtras();
    if (p.get('target')) S.extras.target = +p.get('target');
    S.view = 'game';
  }
})();

function freshState() {
  return {
    view: 'setup',
    gameType: 'eight-ball',
    teams: [
      { players: [], shooterIdx: 0, wins: 0 },
      { players: [], shooterIdx: 0, wins: 0 },
    ],
    extras: {},
    gamesPlayed: 0,
    lastWinner: null,
    breakTeam: null,
    adHoc: [],
    queue: [],
  };
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function allPlayers() { return [...BASE_PLAYERS, ...S.adHoc]; }
function takenSet()   { return new Set([...S.teams[0].players, ...S.teams[1].players]); }
function teamLabel(i) { return S.teams[i].players.join(' & ') || (i === 0 ? 'Team A' : 'Team B'); }
function winVerb(i)   { return S.teams[i].players.length > 1 ? 'win' : 'wins'; }

// HTML-escape for display
function x(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// HTML-escape for attribute values (also escapes single quotes)
function xa(s) { return x(s).replace(/'/g,'&#39;'); }

// ── DISPATCH ────────────────────────────────────────────────────────────────
function D(action, a, b) {
  const T = S.teams;
  switch (action) {
    case 'gameType': S.gameType = a; break;

    case 'addPlayer':
      if (T[a].players.length < 2 && !takenSet().has(b))
        T[a].players.push(b);
      break;

    case 'removePlayer':
      T[a].players.splice(b, 1);
      if (T[a].shooterIdx >= T[a].players.length) T[a].shooterIdx = 0;
      break;

    case 'swapOrder': T[a].players.reverse(); break;

    case 'addAdHoc':
      if (a && !allPlayers().includes(a)) S.adHoc.push(a);
      break;

    case 'start':
      S.extras = GAME_TYPES[S.gameType].initExtras();
      S.gamesPlayed = 0;
      S.breakTeam = null;
      S.queue = [];
      T.forEach(t => { t.wins = 0; t.shooterIdx = 0; });
      S.view = 'game';
      playMode = true;
      break;

    case 'win': {
      const other = a ^ 1;
      T[a].wins++;
      S.gamesPlayed++;
      [a, other].forEach(i => {
        if (T[i].players.length > 1)
          T[i].shooterIdx = T[i].shooterIdx ^ 1;
      });
      S.lastWinner = a;
      // loser goes to back of queue if queue exists
      if (S.queue.length > 0)
        S.queue.push({ players: [...T[other].players] });
      break;
    }

    case 'playAgain': {
      const prevTarget = S.extras.target;
      const winner = S.lastWinner;
      S.lastWinner = null;
      S.breakTeam = winner;
      S.extras = GAME_TYPES[S.gameType].initExtras();
      if (prevTarget !== undefined) S.extras.target = prevTarget;
      playMode = true;
      break;
    }

    case 'playNext': {
      if (S.queue.length === 0) break;
      const winner = S.lastWinner;
      const loser = winner ^ 1;
      const next = S.queue.shift();
      T[loser].players = next.players;
      T[loser].shooterIdx = 0;
      T[loser].wins = 0;
      const prevTarget = S.extras.target;
      S.lastWinner = null;
      S.breakTeam = winner;
      S.extras = GAME_TYPES[S.gameType].initExtras();
      if (prevTarget !== undefined) S.extras.target = prevTarget;
      playMode = true;
      break;
    }

    case 'queueAdd': {
      if (a && a.length > 0) S.queue.push({ players: a });
      break;
    }

    case 'queueRemove':
      S.queue.splice(a, 1);
      break;

    case 'swapShooter':
      if (T[a].players.length > 1) T[a].shooterIdx ^= 1;
      break;

    case 'setSolids':  S.extras.solidsTeam = a; break;
    case 'setStripes': S.extras.solidsTeam = a ^ 1; break;

    case 'adjScore': {
      const scores = [...S.extras.scores];
      scores[a] = Math.max(0, scores[a] + b);
      S.extras.scores = scores;
      const target = S.extras.target;
      if (target && scores[a] >= target) { playMode = false; D('win', a); }
      break;
    }

    case 'setTarget':
      S.extras.target = a;
      break;

    case 'togglePlay': playMode = !playMode; break;

    case 'endSession': S.view = 'summary'; break;
    case 'goHome': playMode = false; S.view = 'setup'; S.lastWinner = null; break;

    case 'coinFlip': { const b = new Uint8Array(1); crypto.getRandomValues(b); S.breakTeam = b[0] & 1; break; }

    case 'newGame':
      S.extras = GAME_TYPES[S.gameType].initExtras();
      S.breakTeam = null;
      S.view = 'game';
      break;

    case 'newSession': {
      const adHoc = S.adHoc;
      S = freshState();
      S.adHoc = adHoc;
      break;
    }
  }
  render();
}

// ── SETUP VIEW ──────────────────────────────────────────────────────────────
function viewSetup() {
  const taken = takenSet();

  const teamCards = S.teams.map((team, ti) => {
    const color = ti === 0 ? 'var(--a)' : 'var(--b)';
    const available = allPlayers().filter(p => !taken.has(p));
    const canAdd = team.players.length < 2;

    const slots = [0, 1].map(si => {
      const p = team.players[si];
      if (p) return `
        <div class="player-slot">
          <span class="name">${x(p)}</span>
          ${team.players.length === 2 && si === team.shooterIdx ? '<span class="badge">shoots first</span>' : ''}
          <button class="btn-ghost btn-sm"
            onclick="D('removePlayer',${ti},${si})">✕</button>
        </div>`;
      return `<div class="player-slot empty">— open slot —</div>`;
    }).join('');

    return `
      <div class="card" style="border-color:${color}">
        <h2>Team ${ti === 0 ? 'A' : 'B'}</h2>
        ${slots}
        ${team.players.length === 2
          ? `<button class="btn-ghost btn-sm mt-sm" onclick="D('swapOrder',${ti})">↕ Swap shooting order</button>`
          : ''}
        ${canAdd ? `
          <div class="divider"></div>
          <div class="label">Add to this team</div>
          <div class="pills">
            ${available.map(p => `
              <button class="pill"
                data-ti="${ti}" data-p="${xa(p)}"
                onclick="D('addPlayer',+this.dataset.ti,this.dataset.p)">
                + ${x(p)}
              </button>`).join('')}
            <button class="pill" style="border-style:dashed" onclick="promptPlayer(${ti})">+ New…</button>
          </div>` : ''}
      </div>`;
  }).join('');

  const canStart = S.teams.every(t => t.players.length >= 1);

  return `

    <div class="card">
      <h2>Game Type</h2>
      <div class="grid2-flat">
        ${Object.values(GAME_TYPES).map(g => `
          <button class="btn-game ${S.gameType === g.id ? 'active' : ''}"
            onclick="D('gameType','${g.id}')">
            ${g.ballHtml('sel')}
            ${g.name}
          </button>
        `).join('')}
      </div>
    </div>

    <div class="grid2">${teamCards}</div>

<button class="btn-primary btn-lg" onclick="D('start')" ${canStart ? '' : 'disabled'}>
      Start Game →
    </button>
    <p style="text-align:center;font-size:0.65rem;opacity:0.35;margin-top:1.5rem">Ball icons by Boris Farias – Flaticon</p>`;
}

// ── GAME VIEW ───────────────────────────────────────────────────────────────
function viewGame() {
  const gt = GAME_TYPES[S.gameType];
  const scorecards = buildScorecards().join('');

  return `
    <div class="game-header">
      <div class="game-badge">${gt.ballHtml('sm')} ${x(gt.name)} · Game ${S.gamesPlayed + 1}</div>
      <h1>${x(teamLabel(0))} vs ${x(teamLabel(1))}</h1>
    </div>

    <div class="grid2">${scorecards}</div>

    ${S.lastWinner === null ? gt.renderExtras(S.extras, S.teams) : ''}

    ${S.lastWinner !== null ? `
    <div class="card" style="text-align:center;padding:1.5rem">
      <div style="font-size:2rem;font-weight:800;margin-bottom:0.75rem">
        🏆 ${x(teamLabel(S.lastWinner))} ${winVerb(S.lastWinner)}!
      </div>
      ${S.queue.length > 0
        ? `<button class="btn-primary btn-lg" onclick="D('playNext')">▶ Play Next: ${x(S.queue[0].players.join(' & '))}</button>`
        : `<button class="btn-primary btn-lg" onclick="D('playAgain')">▶ Play Again</button>`}
    </div>
    ` : `
    <div class="card">
      <h3>Record Win</h3>
      <div class="grid2">
        <button class="btn-a btn-lg" onclick="D('win',0)">${x(teamLabel(0))} Wins</button>
        <button class="btn-b btn-lg" onclick="D('win',1)">${x(teamLabel(1))} Wins</button>
      </div>
    </div>
    `}

    <div class="bottom-row">
      <button class="btn-ghost" onclick="D('togglePlay')">⛶ Play Mode</button>
      <button class="btn-danger" onclick="modal('End this session and see results?',()=>D('endSession'))">
        End Session
      </button>
    </div>`;
}

// ── SUMMARY VIEW ─────────────────────────────────────────────────────────────
function viewSummary() {
  const [a, b] = S.teams;
  const winnerIdx = a.wins > b.wins ? 0 : b.wins > a.wins ? 1 : null;
  const colors  = ['var(--a)', 'var(--b)'];
  const bgAlpha = ['rgba(90,143,212,0.2)', 'rgba(212,147,90,0.2)'];

  const cards = S.teams.map((t, i) => `
    <div class="summary-card" style="border-color:${colors[i]};background:${bgAlpha[i]}">
      <div class="sc-name" style="font-size:1.2rem;font-weight:700">${x(teamLabel(i))}</div>
      <div class="big-score" style="color:${colors[i]}">${t.wins}–${S.teams[i^1].wins}</div>
    </div>`).join('');

  return `
    <h1>Session Over</h1>
    ${winnerIdx !== null
      ? `<p class="big-msg">🏆 ${x(teamLabel(winnerIdx))} ${winVerb(winnerIdx)} the session!</p>`
      : `<p class="big-msg muted">It's a tie!</p>`}
    <div class="grid2 mt-1">${cards}</div>
    <p class="center muted mt-1">${S.gamesPlayed} game${S.gamesPlayed !== 1 ? 's' : ''} · ${x(GAME_TYPES[S.gameType].name)}</p>
    <div class="action-stack mt-1">
      <button class="btn-primary btn-lg" onclick="D('newGame')">Play Again (same teams)</button>
      <button class="btn-ghost btn-lg" onclick="D('newSession')">New Session</button>
    </div>`;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
const BANNER = `<div style="text-align:center;margin-bottom:1.25rem">
  <div style="font-size:1.3rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.35rem">🎱 Pool House Rocks · Billiards</div>
  <div style="height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)"></div>
</div>`;

function buildScorecards(forPlay = false) {
  const gt = GAME_TYPES[S.gameType];
  const colors  = ['var(--a)', 'var(--b)'];
  const bgAlpha = ['rgba(90,143,212,0.15)', 'rgba(212,147,90,0.15)'];
  return S.teams.map((t, i) => {
    const other = i ^ 1;
    const players = t.players.length
      ? t.players.map((p, pi) => {
          const shooting = pi === t.shooterIdx;
          return `<div class="player-box ${shooting ? 'shooting' : 'bench'}">
            <div class="pb-label">${shooting ? '▶ shooting' : 'on deck'}</div>
            <div class="pb-name">${x(p)}</div>
          </div>`;
        }).join('')
      : '<div class="player-box bench"><div class="pb-name muted">—</div></div>';

    const displayName = teamLabel(i);

    if (forPlay) {
      const ballHtml = gt.playBallPicker
        ? gt.playBallPicker(i, S.extras, colors[i])
        : (gt.teamBadge && gt.teamBadge(i, S.extras))
          ? `<div class="play-ball">${gt.teamBadge(i, S.extras)}</div>` : '';
      const playExtrasHtml = gt.playExtras ? gt.playExtras(i, S.extras, colors[i]) : '';
      return `
        <div class="score-card" style="border-color:${colors[i]};background:${bgAlpha[i]}">
          <div class="sc-name">${x(displayName)}</div>
          ${S.breakTeam === i && S.extras.solidsTeam == null ? '<div class="break-badge">Break</div>' : ''}
          ${ballHtml}
          ${playExtrasHtml}
          <button class="play-win-btn" onclick="playMode=false;D('win',${i})">🏆 Win</button>
        </div>`;
    }

    const badge = gt.teamBadge ? gt.teamBadge(i, S.extras) : '';
    const myW = t.wins, theirW = S.teams[other].wins;
    const tallyLabel = myW > theirW ? 'Leads' : myW < theirW ? 'Down' : 'Tied';
    const tallyScore = `${myW}–${theirW}`;
    const tallyHtml = `<div style="text-align:center;margin-top:0.5rem">
      <div style="font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.55;margin-bottom:0.1rem">${tallyLabel}</div>
      <div class="sc-wins" style="color:${colors[i]}">${tallyScore}</div>
    </div>`;
    return `
      <div class="score-card" style="border-color:${colors[i]};background:${bgAlpha[i]}">
        <div class="sc-name">${x(displayName)}</div>
        ${S.breakTeam === i && S.extras.solidsTeam == null ? '<div class="break-badge">Break</div>' : ''}
        ${badge ? `<div class="sc-wins-row">${badge}</div>` : ''}
        <div class="sc-players">${players}</div>
        ${t.players.length > 1
          ? `<button class="sc-swap" onclick="D('swapShooter',${i})">↕ next shooter</button>`
          : ''}
        ${tallyHtml}
        <button class="play-win-btn" onclick="playMode=false;D('win',${i})">🏆 Win</button>
      </div>`;
  });
}

function render() {
  const el = document.getElementById('app');

  if (playMode && S.view === 'game') {
    const [cardA, cardB] = buildScorecards(true);
    const nextUp = S.queue.length > 0
      ? `<div class="play-next-chip">Up next: ${x(S.queue[0].players.join(' & '))}</div>`
      : '';
    el.innerHTML = `
      <div class="play-overlay">
        <button class="play-close" onclick="modal('End this game and return to setup?',()=>D('goHome'))">✕</button>
        <div class="play-cards">${cardA}${cardB}</div>
        ${nextUp}
        <div class="play-toolbar">
          <button onclick="D('coinFlip')"><img src="./assets/images/billiards/coin.png" width="18" height="18" style="vertical-align:middle;margin-right:0.35em">Flip for break</button>
          <button onclick="showQueueModal()">👥 Up Next</button>
          <button onclick="D('togglePlay')">⚙ Game Settings</button>
        </div>
      </div>`;
    return;
  }

  let html = BANNER;
  if      (S.view === 'setup')   html += viewSetup();
  else if (S.view === 'game')    html += viewGame();
  else                           html += viewSummary();
  el.innerHTML = html;
}

function showTargetPicker() {
  const root = document.getElementById('modal-root');
  const current = S.extras.target;
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <p>Playing to…</p>
        <div style="display:flex;flex-direction:column;gap:0.6rem">
          ${[50,75,100,125,150].map(n => `
            <button class="${n === current ? 'btn-primary' : 'btn-ghost'}"
              onclick="D('setTarget',${n});closeModal()">
              ${n}${n === current ? ' ✓' : ''}
            </button>`).join('')}
        </div>
        <button class="btn-ghost" style="width:100%;margin-top:0.75rem" onclick="closeModal()">Cancel</button>
      </div>
    </div>`;
}
window.showTargetPicker = showTargetPicker;

function showQueueModal() {
  const root = document.getElementById('modal-root');
  const isPartner = S.teams.some(t => t.players.length === 2);
  const maxSize = isPartner ? 2 : 1;
  const inGame = new Set([...S.teams[0].players, ...S.teams[1].players]);
  const inQueue = new Set(S.queue.flatMap(e => e.players));
  const available = allPlayers().filter(p => !inGame.has(p) && !inQueue.has(p) && !queuePending.includes(p));

  const queueHtml = S.queue.length === 0
    ? `<p style="opacity:0.5;text-align:center;margin:0.5rem 0">No one waiting</p>`
    : S.queue.map((entry, idx) => `
        <div style="display:flex;align-items:center;gap:0.5rem;background:var(--surface2);border-radius:9px;padding:0.5rem 0.75rem;margin-bottom:0.4rem">
          <span style="font-size:0.85rem;opacity:0.5;min-width:1.2rem">${idx + 1}.</span>
          <span style="flex:1;font-weight:600">${x(entry.players.join(' & '))}</span>
          <button class="btn-ghost btn-sm" onclick="D('queueRemove',${idx});showQueueModal()">✕</button>
        </div>`).join('');

  const pendingHtml = queuePending.length > 0 ? `
    <div style="display:flex;align-items:center;gap:0.5rem;background:rgba(46,138,87,0.15);border:1px solid var(--accent);border-radius:9px;padding:0.5rem 0.75rem;margin-bottom:0.5rem">
      <span style="flex:1;font-weight:600">${x(queuePending.join(' & '))}</span>
      <button class="btn-ghost btn-sm" onclick="queuePending=[];showQueueModal()">✕</button>
      ${queuePending.length === maxSize
        ? `<button class="btn-primary btn-sm" onclick="D('queueAdd',[...queuePending]);queuePending=[];showQueueModal()">Add →</button>`
        : isPartner ? `<span style="opacity:0.5;font-size:0.85rem">pick 2nd</span>` : ''}
    </div>` : '';

  const pillsHtml = available.length > 0 ? `
    <div class="label" style="margin-bottom:0.3rem">${queuePending.length === 0 ? 'Add to queue' : 'Add partner'}:</div>
    <div class="pills">
      ${available.map(p => `
        <button class="pill" data-p="${xa(p)}"
          onclick="queuePending.push(this.dataset.p);${queuePending.length + 1 >= maxSize ? "D('queueAdd',[...queuePending]);queuePending=[];" : ''}showQueueModal()">
          + ${x(p)}
        </button>`).join('')}
    </div>` : '';

  const newPlayerForm = `
    <div style="display:flex;gap:0.5rem;margin-top:0.6rem">
      <input id="q-new" type="text" placeholder="New player name…" style="margin:0;flex:1">
      <button class="btn-ghost" style="white-space:nowrap" onclick="
        const n=document.getElementById('q-new').value.trim();
        if(n){D('addAdHoc',n);queuePending.push(n);${`if(queuePending.length>=${maxSize}){D('queueAdd',[...queuePending]);queuePending=[];}`}showQueueModal();}
      ">+ Add</button>
    </div>`;

  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this){queuePending=[];closeModal()}">
      <div class="modal" style="min-width:min(90vw,420px)">
        <p style="font-weight:700;font-size:1.1rem;margin-bottom:0.75rem">Up Next Queue</p>
        ${queueHtml}
        <div style="margin-top:0.75rem">
          ${pendingHtml}
          ${pillsHtml}
          ${newPlayerForm}
        </div>
        <button class="btn-ghost" style="width:100%;margin-top:0.75rem" onclick="queuePending=[];closeModal()">Done</button>
      </div>
    </div>`;
}
window.showQueueModal = showQueueModal;

function promptPlayer(ti) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <p>New player name</p>
        <input id="prompt-input" type="text" placeholder="Name…" style="margin-bottom:0.75rem">
        <div class="modal-btns">
          <button class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" id="prompt-ok">Add</button>
        </div>
      </div>
    </div>`;
  const input = document.getElementById('prompt-input');
  const ok = document.getElementById('prompt-ok');
  const submit = () => {
    const n = input.value.trim();
    if (n) { closeModal(); D('addAdHoc', n); D('addPlayer', ti, n); }
  };
  ok.onclick = submit;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  input.focus();
}
window.promptPlayer = promptPlayer;

function modal(msg, onConfirm) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <p>${x(msg)}</p>
        <div class="modal-btns">
          <button class="btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn-danger" id="modal-ok">Confirm</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-ok').onclick = () => { closeModal(); onConfirm(); };
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
window.D = D;

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { queuePending = []; closeModal(); }
});

render();
</script>
</body>
</html>
